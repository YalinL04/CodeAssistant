# GRPO Training Configuration
model:
  name: "outputs/sft/merged"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

quantization:
  load_in_4bit: false
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"
  bias: "none"

grpo:
  num_generations: 8
  max_completion_length: 1024
  temperature: 0.7
  top_p: 0.95
  beta: 0.001
  loss_type: "grpo"
  num_iterations: 1
  scale_rewards: true
  reward_weights:
    - 0.70   # correctness
    - 0.15   # readability
    - 0.15   # efficiency

training:
  output_dir: "outputs/grpo"
  max_steps: 900
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  max_grad_norm: 0.5
  weight_decay: 0.01
  bf16: true
  gradient_checkpointing: true
  logging_steps: 5
  save_steps: 100
  save_total_limit: 5
  seed: 42
  optim: "paged_adamw_8bit"

sandbox:
  timeout: 10
  memory_limit_mb: 512

data:
  dataset_name: "humaneval"
  dataset_split: "train"
  prompt_file: "data/processed/grpo_prompts.jsonl"
